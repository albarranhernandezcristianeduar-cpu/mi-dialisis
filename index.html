<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control de Diálisis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="app-container">
        <h1>🌱 Mi Control de Diálisis</h1>
        
        <form id="dialisis-form">
            <fieldset>
                <legend>Datos de la Sesión</legend>
                
                <div class="input-group">
                    <label>Día / Fecha:</label>
                    <input type="date" id="fecha" required>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Hora Inicio:</label>
                        <input type="time" id="hora-inicio" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Hora Término:</label>
                        <input type="time" id="hora-fin" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Bolsas utilizadas:</label>
                    <select id="tipo-bolsa">
                        <option value="1.5% (Amarilla)">1.5% (Amarilla)</option>
                        <option value="2.5% (Verde)">2.5% (Verde)</option>
                        <option value="4.25% (Roja)">4.25% (Roja)</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label>UF Total (ml):</label>
                        <input type="number" id="uf-total" placeholder="Ej: 520">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Drenaje (ml):</label>
                        <input type="number" id="drenaje" placeholder="Ej: 2170">
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Líquidos (ml):</label>
                        <input type="number" id="liquidos" placeholder="ml">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>T.A. (Presión):</label>
                        <input type="text" id="presion" placeholder="120/80">
                    </div>
                </div>

                <div class="input-group">
                    <label>Glucosa (mg/dL):</label>
                    <input type="number" id="glucosa" placeholder="Ej: 110">
                </div>

                <div class="input-group">
                    <label>Observaciones / Notas:</label>
                    <textarea id="notas" rows="3" placeholder="¿Cómo te sentiste hoy?"></textarea>
                </div>
            </fieldset>

            <button type="submit" class="btn-primary">💾 Registrar Sesión</button>
        </form>

        <button id="download-pdf" class="btn-pdf" style="margin-top: 15px;">📄 Descargar Reporte PDF</button>

        <div id="historial-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Historial Reciente</h2>
                <button id="borrar-todo" style="background: #ba1a1a; color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer;">🗑️ Borrar Todo</button>
            </div>
            <div id="lista-historial"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
